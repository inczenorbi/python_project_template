# Ruff configuration
line-length = 100
target-version = "py311"

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # import sorting
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "C4",  # flake8-comprehensions
    "ISC", # implicit string concat
    "RUF", # ruff-specific rules
]
ignore = [
    "ISC001", # Conflicts with the formatter; Ruff recommends disabling it when format is enabled.
]
